<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ratings & Feedback</title>
<style>
body {
    font-family: Arial;
    margin:0;
    background:#f4f6f8;
}
/* Header */
header {
    background:#002b5c;
    color:white;
    text-align:center;

    padding:20px;
}
/* Navigation */
nav {
    background:#00509e;
    padding:10px;
    text-align:center;
}
nav a {
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}
/* Form Container */
.container {
    width:50%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:8px;
}
/* Outside Sections */

.section {
    width:80%;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}
/* Stars */
.star {
    font-size:30px;
    cursor:pointer;
    color:gray;
}
.star.selected {
    color:gold;
}
/* Inputs */
textarea {
    width:100%;
    padding:10px;

    margin-top:10px;
    border-radius:5px;

}
/* Button */
button {
    background:#00509e;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    margin-top:10px;
    border-radius:6px;
    cursor:pointer;
}
button:hover {
    background:#003f7f;
}
</style>
<script>
let rating = 0;
function setRating(value) {
    rating = value;
    let stars = document.querySelectorAll(".star");
    stars.forEach((star, index) => {
        if (index < value) {	

            star.classList.add("selected");
        } else {
            star.classList.remove("selected");
        }
    });
}
function submitFeedback() {
    if (rating === 0) {
      alert("Please select rating!");
        return;
    }
    alert("Thank you! You rated " + rating + " stars ⭐");
}
</script>
</head>
<body>
<header>
<h1>UCEV Hostel</h1>
<p>University College of Engineering Villupuram</p>
</header>
<nav>
<a href="index.html">Home</a>
<a href="foodmenu.html">Food Menu</a>

<a href="feepayment.html">Fees & Payment</a>
<a href="student.html">Student Details</a>
<a href="contact.html">Contact</a>
<a href="ratings.html">Ratings</a>
</nav>
<!-- FORM -->
<div class="container">
<h2 style="text-align:center;">Rate Our Hostel</h2>
<div style="text-align:center;">
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>
</div>
<textarea rows="4" placeholder="Write your feedback..."></textarea>
<button onclick="submitFeedback()">Submit</button>
</div>
<!-- PREVIOUS REVIEWS -->
<div class="section">
<h3>Student Reviews</h3>
<p>⭐️⭐️⭐️⭐️⭐️ - Very good hostel facilities</p>
<p>⭐️⭐️⭐️⭐️ - Food is nice</p>

<p>⭐️⭐️⭐️ - Rooms are average</p>
</div>
</body>
</html>
